<mat-toolbar color="primary">
  <!-- App Title / Logo -->
  <span routerLink="/home" style="cursor: pointer;">NeighbourBook</span>

  <span class="spacer"></span>

  <!-- Nav Links -->
  <a mat-button routerLink="/services" routerLinkActive="active-link"> Search Services</a>
  <a mat-button routerLink="/auth" routerLinkActive="active-link">Sign In</a>

  <!-- Actions Menu (dropdown) -->
  <button mat-icon-button [matMenuTriggerFor]="actionsMenu">
    <mat-icon>account_circle</mat-icon>
  </button>

  <mat-menu #actionsMenu="matMenu">
    <button mat-menu-item routerLink="/profile">
      <mat-icon>person</mat-icon>
      <span>Profile</span>
    </button>
    <button mat-menu-item routerLink="/settings">
      <mat-icon>settings</mat-icon>
      <span>Settings</span>
    </button>
    <mat-divider></mat-divider>
    <button mat-menu-item (click)="logout()">
      <mat-icon>logout</mat-icon>
      <span>Logout</span>
    </button>
  </mat-menu>

</mat-toolbar>
